name: Django CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4   # ✅ updated version

    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          echo "🚀 Deployment started"

          # 🔹 Go to project directory
          cd /home/azureuser/temp/dummy_django_app || exit 1

          echo "📥 Pulling latest code"
          git pull origin main

          echo "🐍 Activating virtual environment"
          source venv/bin/activate

          echo "📦 Installing dependencies"
          pip install -r requirements.txt

          echo "🗄 Running migrations"
          python manage.py migrate

          echo "📁 Collecting static files"
          python manage.py collectstatic --noinput

          echo "🛑 Stopping old Gunicorn"
          pkill gunicorn || true

          echo "🚀 Starting Gunicorn (production mode)"
          nohup /home/azureuser/temp/dummy_django_app/venv/bin/gunicorn \
          config.wsgi:application \
          --bind 127.0.0.1:8010 \
          --workers 3 \
          > /home/azureuser/temp/dummy_django_app/gunicorn.log 2>&1 &

          echo "⏳ Waiting for Gunicorn to start"
          sleep 5

          echo "🔍 Checking Gunicorn response"
          curl http://127.0.0.1:8010 || echo "❌ Gunicorn failed to respond"

          echo "🔁 Reloading Nginx"
          sudo systemctl reload nginx

          echo "✅ Deployment completed successfully"